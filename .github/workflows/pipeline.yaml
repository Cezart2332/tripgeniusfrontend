name: CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:

# ─────────────────────────────
# 1. TEST & LINT
# ─────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test -- --coverage --watchAll=false


# ─────────────────────────────
# 2. SEMGREP SAST
# ─────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/typescript
            p/react
            p/secrets
            p/owasp-top-ten


# ─────────────────────────────
# 3. BUILD & PUSH DOCKER IMAGE
# ─────────────────────────────
  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test, semgrep]        

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            cezarique/tripgenius:latest
            cezarique/tripgenius:sha-${{ github.sha }}
          cache-from: type=registry,ref=cezarique/tripgenius:cache
          cache-to: type=registry,ref=cezarique/tripgenius:cache,mode=max
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_OPEN_TRIP_MAP=${{ secrets.VITE_OPEN_TRIP_MAP }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}


# ─────────────────────────────
# 4. TRIVY SECURITY GATE
# ─────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: cezarique/tripgenius:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'


# ─────────────────────────────
# 5. OWASP ZAP
# ─────────────────────────────
  zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v5

      - name: Start app container
        run: |
          docker run -d --name app -p 8080:80 cezarique/tripgenius:sha-${{ github.sha }}

          for i in {1..30}; do
            if curl -sf http://localhost:8080/health; then
              echo "App ready on http://localhost:8080"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become ready"
          docker logs app
          exit 1

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'
          fail_action: false
          allow_issue_writing: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: docker rm -f app


# ─────────────────────────────
# 6. DEPLOY (ONLY IF ALL OK)
# ─────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [build, trivy, zap]

    steps:
      - name: Trigger deployment
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_DOMAIN }}
          COOLIFY_UUID: ${{ secrets.COOLIFY_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl -sSf -X POST "$COOLIFY_URL/api/v1/deploy" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"$COOLIFY_UUID\",\"force\":true}"