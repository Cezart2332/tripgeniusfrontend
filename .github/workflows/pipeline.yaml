name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─── JOB 1: Test & Lint ─────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '25'        
          cache: 'npm'

      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test -- --coverage --watchAll=false

  # ─── JOB 2: Build & Push ────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test                   

    steps:
      - uses: actions/checkout@v5  

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            cezarique/tripgenius:latest
            cezarique/tripgenius:sha-${{ github.sha }}  
          cache-from: type=registry,ref=cezarique/tripgenius:cache
          cache-to: type=registry,ref=cezarique/tripgenius:cache,mode=max
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_OPEN_TRIP_MAP=${{ secrets.VITE_OPEN_TRIP_MAP }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}

  # ─── JOB 3: ZAP Scan ────────────────────────────────────
  zap-scan:
    name: 🔍 OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read
      issues: write
      security-events: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start app container
        run: |
          docker run -d --name react-app -p 8080:80 \
            cezarique/tripgenius:sha-${{ github.sha }}

          for i in {1..30}; do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "App is up!"; break
            fi
            echo "Attempt $i/30..."; sleep 2
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('zap-results.sarif') != ''
        with:
          sarif_file: zap-results.sarif   
          category: zap-security-scan

      - name: Cleanup
        if: always()
        run: docker rm -f react-app

  # ─── JOB 4: Deploy ──────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, zap-scan]        

    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_DOMAIN }}
          COOLIFY_UUID: ${{ secrets.COOLIFY_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl -sSf -X POST "$COOLIFY_URL/api/v1/deploy" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"$COOLIFY_UUID\",\"force\":true}"