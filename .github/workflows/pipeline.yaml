name: CI Pipeline

on:
  push:
    branches: [main]

jobs:
  # ─── JOB 1: Tests & Lint ────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check  

      - name: Run tests
        run: npm test -- --coverage --watchAll=false


  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          pull: true
          tags: |
            cezarique/tripgenius:latest
          cache-from: type=registry,ref=cezarique/tripgenius:cache
          cache-to: type=registry,ref=cezarique/tripgenius:cache,mode=max
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            VITE_OPEN_TRIP_MAP=${{ secrets.VITE_OPEN_TRIP_MAP }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}

  zap-scan:
    name: 🔍 OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: read
      issues: write          # ca să poată deschide issues automat
      security-events: write # pentru upload SARIF la GitHub Security

    steps:
      - uses: actions/checkout@v4

      # Pornești imaginea ta React local pe portul 8080
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start app container
        run: |
          docker run -d \
            --name react-app \
            -p 8080:80 \
            cezarique/tripgenius:latest

          # Aștepți să fie healthy
          echo "Waiting for app to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "App is up!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      # Rulezi ZAP Baseline Scan (rapid, ~2 min)
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'   # opțional - vezi mai jos
          cmd_options: '-a'                    # include ajax spider
          fail_action: true                    # fail dacă găsește High alerts
          artifact_name: 'zap-baseline-report'
          allow_issue_writing: false


      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()    # chiar dacă scan-ul a eșuat
        with:
          name: zap-security-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report_sarif.sarif
          category: zap-security-scan

      - name: Cleanup container
        if: always()
        run: docker rm -f react-app
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_DOMAIN }}   
          COOLIFY_UUID: ${{ secrets.COOLIFY_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl -sSf -X POST "$COOLIFY_URL/api/v1/deploy" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"uuid\":\"$COOLIFY_UUID\",\"force\":true}"