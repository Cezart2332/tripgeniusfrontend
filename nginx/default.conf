# ─────────────────────────────────────────────────────────────
# TripGenius — Production Nginx Config
# Google OAuth + CSP + SPA + Service Worker FIXED (Inheritance Bug Fixed)
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────────────────
    # Content Security Policy Definition
    # ──────────────────────────────────────────────────────────
    set $csp "default-src 'self'; base-uri 'self'; form-action 'self'; script-src 'self' https://accounts.google.com https://accounts.gstatic.com https://apis.google.com; style-src 'self' https://fonts.googleapis.com https://accounts.google.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: blob: https://api.tripgenius.online https://ui-avatars.com https://basemaps.cartocdn.com https://.cartocdn.com https://tile.openstreetmap.org https://fonts.gstatic.com https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.tripgenius.online wss://api.tripgenius.online https://basemaps.cartocdn.com https://.cartocdn.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.opentripmap.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://ui-avatars.com; frame-src 'self' https://accounts.google.com; child-src 'self' https://accounts.google.com; frame-ancestors 'self'; worker-src 'self' blob:; manifest-src 'self';";

    # ──────────────────────────────────────────────────────────
    # Global Security Headers
    # ──────────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-XSS-Protection             "1; mode=block" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
    add_header Content-Security-Policy      $csp always;

    # ──────────────────────────────────────────────────────────
    # SPA Fallback
    # ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────────────────
    # index.html — no cache
    # ──────────────────────────────────────────────────────────
    location = /index.html {
        # Security Headers replicated due to Nginx inheritance rules
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # Static assets — long cache
    # ──────────────────────────────────────────────────────────
    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|ico)$ {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Content-Security-Policy      $csp always;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # JSON / Manifest
    # ──────────────────────────────────────────────────────────
    location ~* \.(?:json|webmanifest)$ {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # robots.txt + sitemap.xml
    # ──────────────────────────────────────────────────────────
    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "public, max-age=86400" always;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # Service Worker
    # ──────────────────────────────────────────────────────────
    location = /sw.js {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # Error pages
    # ──────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}