# ─────────────────────────────────────────────────────────────
#  TripGenius — Nginx config
# ─────────────────────────────────────────────────────────────

map $sent_http_content_type $csp_header {
    default "default-src 'self'; base-uri 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.tripgenius.online wss://api.tripgenius.online https://basemaps.cartocdn.com https://*.cartocdn.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.opentripmap.com https://fonts.googleapis.com https://fonts.gstatic.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://ui-avatars.com; frame-ancestors 'self'; form-action 'self'; worker-src 'self' blob:; manifest-src 'self';";
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────────────────
    # location / — SPA fallback
    # ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options                "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options         "nosniff"                         always;
        add_header X-XSS-Protection               "1; mode=block"                   always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy     "same-origin"                     always;
        # CORP same-site: permite resurse de pe api.tripgenius.online (acelasi domeniu parinte)
        add_header Cross-Origin-Resource-Policy   "same-site"                       always;
        # COEP unsafe-none: nu blocheaza resurse externe fara CORP (avatare, harti etc.)
        add_header Cross-Origin-Embedder-Policy   "unsafe-none"                     always;
        add_header Content-Security-Policy        $csp_header                       always;
    }

    # ──────────────────────────────────────────────────────────
    # index.html — fara cache
    # ──────────────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control                  "no-cache, no-store, must-revalidate" always;
        add_header Pragma                         "no-cache"                         always;
        expires 0;

        add_header X-Frame-Options                "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options         "nosniff"                         always;
        add_header X-XSS-Protection               "1; mode=block"                   always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy     "same-origin"                     always;
        add_header Cross-Origin-Resource-Policy   "same-site"                       always;
        add_header Cross-Origin-Embedder-Policy   "unsafe-none"                     always;
        add_header Content-Security-Policy        $csp_header                       always;
    }

    # ──────────────────────────────────────────────────────────
    # Assets statice cu fingerprint — cache 1 an
    # ──────────────────────────────────────────────────────────
    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|ico)$ {
        expires 365d;
        add_header Cache-Control                  "public, max-age=31536000, immutable" always;

        add_header X-Frame-Options                "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options         "nosniff"                         always;
        add_header X-XSS-Protection               "1; mode=block"                   always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy     "same-origin"                     always;
        add_header Cross-Origin-Resource-Policy   "same-site"                       always;
        add_header Cross-Origin-Embedder-Policy   "unsafe-none"                     always;
        add_header Content-Security-Policy        $csp_header                       always;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # manifest / service worker — fara cache
    # ──────────────────────────────────────────────────────────
    location ~* \.(?:json|webmanifest)$ {
        add_header Cache-Control                  "no-cache, no-store, must-revalidate" always;
        add_header Pragma                         "no-cache"                         always;
        expires 0;

        add_header X-Frame-Options                "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options         "nosniff"                         always;
        add_header X-XSS-Protection               "1; mode=block"                   always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy     "same-origin"                     always;
        add_header Cross-Origin-Resource-Policy   "same-site"                       always;
        add_header Cross-Origin-Embedder-Policy   "unsafe-none"                     always;
        add_header Content-Security-Policy        $csp_header                       always;

        try_files $uri =404;
    }

    # ──────────────────────────────────────────────────────────
    # Pagini de eroare
    # ──────────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root     /usr/share/nginx/html;
        internal;
    }
}