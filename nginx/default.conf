# ─────────────────────────────────────────────────────────────
# TripGenius — Unified Production Nginx Config (Coolify)
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # 1. Dynamic Nonce Injection
    sub_filter_types text/html;
    sub_filter '{{csp-nonce}}' $request_id;
    sub_filter_once off;

    # 2. CSP Definition
    set $csp "default-src 'self'; base-uri 'self'; form-action 'self'; script-src 'self' 'nonce-$request_id' https://accounts.google.com https://accounts.gstatic.com https://apis.google.com; style-src 'self' 'nonce-$request_id' https://fonts.googleapis.com https://accounts.google.com; style-src-elem 'self' 'nonce-$request_id' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: blob: https://ui-avatars.com https://basemaps.cartocdn.com https://*.cartocdn.com https://tile.openstreetmap.org https://fonts.gstatic.com https://lh3.googleusercontent.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://basemaps.cartocdn.com https://*.cartocdn.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.opentripmap.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://ui-avatars.com; frame-src 'self' https://accounts.google.com; child-src 'self' https://accounts.google.com; frame-ancestors 'self'; worker-src 'self' blob:; manifest-src 'self';";

    # 3. Routing pentru API (Ctre C#)
    location /api/ {
        proxy_pass http://backend:8080; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        proxy_read_timeout 90;
    }

    # 4. Routing pentru Frontend & Securitate
    location / {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header X-XSS-Protection             "1; mode=block" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy           "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Content-Security-Policy      $csp always;

        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;

        try_files $uri =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|ico)$ {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header Content-Security-Policy      $csp always;

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        try_files $uri =404;
    }

    location ~* ^/(sw\.js|manifest\.json|.*\.webmanifest)$ {
        add_header X-Frame-Options              "SAMEORIGIN" always;
        add_header X-Content-Type-Options       "nosniff" always;
        add_header Content-Security-Policy      $csp always;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;

        try_files $uri =404;
    }
}