# ─────────────────────────────────────────────────────────────
#  TripGenius — Nginx config
#  Fix: security headers re-declared in every location block
#  (nginx nu moștenește add_header din server {} în location {})
# ─────────────────────────────────────────────────────────────

# Macro cu toate headerele de securitate — inclus în fiecare location
map $sent_http_content_type $csp_header {
    default "default-src 'self'; base-uri 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.tripgenius.online wss://api.tripgenius.online https://basemaps.cartocdn.com https://*.cartocdn.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.opentripmap.com https://fonts.googleapis.com https://fonts.gstatic.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://ui-avatars.com; frame-ancestors 'self'; form-action 'self'; worker-src 'self' blob:; manifest-src 'self';";
}

server {
    listen 80;
    server_name _;

    # Ascunde versiunea Nginx din header-ul Server
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Headerul Anti-clickjacking (ZAP: Missing Anti-clickjacking)
    # ----------------------------------------------------------
    add_header X-Frame-Options            "SAMEORIGIN"                         always;

    # ----------------------------------------------------------
    # Celelalte headere globale
    # ----------------------------------------------------------
    add_header X-Content-Type-Options     "nosniff"                            always;
    add_header X-XSS-Protection           "1; mode=block"                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy         "geolocation=(self), microphone=(), camera=()" always;

    # HSTS — dezactivat pe HTTP/80; activează-l în Coolify/proxy la nivel HTTPS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cross-Origin isolation
    add_header Cross-Origin-Embedder-Policy  "require-corp"   always;
    add_header Cross-Origin-Opener-Policy    "same-origin"    always;
    add_header Cross-Origin-Resource-Policy  "same-origin"    always;

    # CSP (ZAP: Content Security Policy Header Not Set)
    add_header Content-Security-Policy $csp_header always;

    # ----------------------------------------------------------
    # / — SPA fallback (React Router)
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Re-declarăm toate headerele (nginx le pierde la add_header din location)
        add_header X-Frame-Options            "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Embedder-Policy  "require-corp"   always;
        add_header Cross-Origin-Opener-Policy    "same-origin"    always;
        add_header Cross-Origin-Resource-Policy  "same-origin"    always;
        add_header Content-Security-Policy    $csp_header         always;
    }

    # ----------------------------------------------------------
    # index.html — fără cache (ZAP: Re-examine Cache-control)
    # ----------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        expires 0;

        # Security headers
        add_header X-Frame-Options            "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Embedder-Policy  "require-corp"   always;
        add_header Cross-Origin-Opener-Policy    "same-origin"    always;
        add_header Cross-Origin-Resource-Policy  "same-origin"    always;
        add_header Content-Security-Policy    $csp_header         always;
    }

    # ----------------------------------------------------------
    # Assets statice cu fingerprint — cache agresiv (1 an)
    # ----------------------------------------------------------
    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|ico|xml)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # Security headers (trebuie repetate și aici)
        add_header X-Frame-Options            "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Embedder-Policy  "require-corp"   always;
        add_header Cross-Origin-Opener-Policy    "same-origin"    always;
        add_header Cross-Origin-Resource-Policy  "same-origin"    always;
        add_header Content-Security-Policy    $csp_header         always;

        try_files $uri =404;
    }

    # ----------------------------------------------------------
    # manifest.json / service worker — fără cache
    # ----------------------------------------------------------
    location ~* \.(?:json|webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;

        add_header X-Frame-Options            "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options     "nosniff"                            always;
        add_header X-XSS-Protection           "1; mode=block"                      always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy         "geolocation=(self), microphone=(), camera=()" always;
        add_header Cross-Origin-Embedder-Policy  "require-corp"   always;
        add_header Cross-Origin-Opener-Policy    "same-origin"    always;
        add_header Cross-Origin-Resource-Policy  "same-origin"    always;
        add_header Content-Security-Policy    $csp_header         always;

        try_files $uri =404;
    }

    # ----------------------------------------------------------
    # Pagini de eroare
    # ----------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root     /usr/share/nginx/html;
        internal;
    }
}