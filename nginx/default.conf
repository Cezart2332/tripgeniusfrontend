server {

    listen 80;

    server_name _;

    # Hide nginx version
    server_tokens off;

    root /usr/share/nginx/html;

    index index.html;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy: remove unsafe-eval and restrict frame ancestors and form actions
    # Note: keep 'unsafe-inline' for styles to avoid breaking some build setups; consider moving inline styles to external files.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.tripgenius.online wss://api.tripgenius.online https://basemaps.cartocdn.com https://*.cartocdn.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.opentripmap.com https://fonts.googleapis.com https://fonts.gstatic.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://ui-avatars.com; frame-ancestors 'self'; form-action 'self'; worker-src 'self' blob:; manifest-src 'self';" always;

    # Cross-origin policies to enable secure embedding and isolation
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure the SPA entry is not aggressively cached
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Long cache for static assets (fingerprinted): 1 year, immutable
    location ~* \.(?:css|js|png|jpg|jpeg|svg|webp|woff2?|ttf|eot|ico|json|xml)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

}

